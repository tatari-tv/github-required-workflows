name: ci
env:
  POETRY_VERSION: '2.1.3'

on:
  push:
    branches:
      - '**'

permissions:
  contents: write
  id-token: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: tatari-tv/github-actions/checkout@v5
      - id: setup
        uses: tatari-tv/github-actions/poetry-install@v5
        with:
          codeartifact-role: ${{secrets.PROD_CODEARTIFACT_ROLE}}
          python-version: '3.11'
          poetry-version: '${{env.POETRY_VERSION}}'
          cache-pre-commit: 'true'
      - name: Run pre-commit
        run: make lint
