name: Tatari Org Security

on:
  pull_request:
    types:
      - 'opened'
      - 'reopened'
      - 'synchronize'

permissions:
  contents: read
  pull-requests: read

jobs:
  required-workflows-security:
    name: Required Workflows Security
    runs-on: ubuntu-20.04
    steps:
      - uses: tatari-tv/github-actions/checkout@v5
      - uses: gitleaks/gitleaks-action@e6dab246340401bf53eec993b8f05aebe80ac636  # 2.3.4
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
          GITLEAKS_LICENSE: ${{secrets.GITLEAKS_LICENSE}}
