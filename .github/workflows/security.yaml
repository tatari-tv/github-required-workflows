name: Tatari Org Security

on:
  pull_request:
    types:
      - 'opened'
      - 'reopened'
      - 'synchronize'

permissions:
  contents: read
  pull-requests: read

jobs:
  required-workflows-security:
    name: Required Workflows Security
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'Initial commit')"
    steps:
      - uses: tatari-tv/github-actions/checkout@v5
      # gitleaks-action partial-scans via `git log <base>^..<head>`. That walk
      # fails in two distinct cases:
      #   1. Refspec-missing base: actions/checkout fetches only refs/pull/N/head,
      #      so the base SHA may not be in remote-tracking refs.
      #   2. Root-commit base: <base>^ doesn't exist, period.
      # Healthy PRs hit the cat-file check in microseconds and skip the fetch.
      - name: Ensure gitleaks base is reachable
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if ! git cat-file -e "${BASE_SHA}" 2>/dev/null; then
            echo "::notice::Base SHA not in local refs; fetching explicitly."
            git fetch --no-tags --depth=2147483647 origin \
              "+${BASE_SHA}:refs/remotes/origin/pr-base" \
              || git fetch --no-tags --depth=2147483647 origin "${BASE_SHA}"
          fi
          if ! git cat-file -e "${BASE_SHA}^" >/dev/null 2>&1; then
            echo "::warning::Base SHA is a root commit; gitleaks partial-scan range is invalid."
            echo "::warning::Follow-up: switch to full-scan mode in this case."
          fi
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
          GITLEAKS_LICENSE: ${{secrets.GITLEAKS_LICENSE}}
