name: ci

on:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install poetry==2.1.3
      - run: poetry install
      - name: Run pre-commit
        run: make lint
